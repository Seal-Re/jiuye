  - id: "AT-volcano-center"
    name: "火山·中心"
    desc: >
      16-bit pixel art, top-down RPG volcano terrain tile, 48x48, clean pixel grid,
      NO anti-aliasing, NO blur. Black basalt ground with winding orange-red lava river
      flowing through. Obsidian pillars at edges. Floating tiny orange ember sparks.
      Left-top lighting with intense orange ground glow complement from below.
      5-color ramp: black, dark red, orange, bright orange, yellow. Selout outline.
      Solid background. Collision: wall (deadly).

  - id: "AT-snow-center"
    name: "雪原·中心"
