      16-bit pixel art, top-down RPG netherworld terrain tile, 48x48, clean pixel grid,
      NO anti-aliasing, NO blur. Full grey-black scorched earth with cracks revealing
      eerie green ghost-fire glow. Scattered white bones. A twisted dead tree.
      Left-top lighting dimmed overall. 5-color ramp: black, dark grey, ghost-green,
      bone-white, dim purple. Selout outline. Solid background. Collision: wall.

  - id: "AT-spirit-center"
    name: "灵脉·中心"
    desc: >
      16-bit pixel art, top-down RPG spirit-blessed terrain tile, 48x48, clean pixel grid,
      NO anti-aliasing, NO blur. Full jade-green ground with golden spirit energy motes
      rising. Tiny red-capped lingzhi mushrooms (red cap with white ring, tiny specks)
      on jade platforms. Auspicious cloud wisps. Left-top lighting enhanced by golden glow.
      5-color ramp: dark jade, emerald, gold, white-gold, pure light. Selout outline.
      Solid background.

