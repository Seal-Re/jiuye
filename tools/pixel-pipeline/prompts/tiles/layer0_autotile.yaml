# 九野 · Layer 0 — 基础地形 Autotile 套件
# 每地形 13 块: 中心 + 4边 + 4内角 + 4外角 = 无缝自动拼接
# 6 地形 + 4 特殊 = 10 套 × 13 ≈ 130 张
# 视觉宪法: 48x48, clean pixel grid, NO anti-aliasing, left-top lighting, selout, 5-tone ramp

