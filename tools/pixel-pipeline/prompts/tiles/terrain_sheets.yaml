# 九野 · 大图 Terrain Group Sheet Prompts (v4)
# 每个地形组 = 一张 192×192 大图 (4×4 grid), AI 单次生成保证纹理一致
# 布局: 中心2×2=center, 边缘=edges, 角落=outer-corners

prompts:
  # ═══════════════════════════════════════════
  # 草地组 (Grass Group Sheet)
  # ═══════════════════════════════════════════
  - id: "grass-sheet"
    name: "草地地形组大图"
    target_size: [192, 192]
    desc: >
      16-bit pixel art, top-down RPG terrain tileset sheet, 192x192 pixels, 4x4 grid
      of 48x48 tiles separated by thin dark grid lines. Each tile MUST contain different
      content as specified. NO anti-aliasing, NO blur.
      Tile layout (row, col):
      (0,0) top-left corner: small grass patch in bottom-right quarter only, rest is dirt.
      (0,1) top edge: grass on bottom half, dirt on top half, horizontal boundary.
      (0,2) top-right corner: small grass patch in bottom-left quarter only, rest is dirt.
      (0,3) top edge: grass on bottom half, dirt on top half.
      (1,0) left edge: grass on right half, dirt on left half, vertical boundary.
      (1,1) center: full grass coverage, pure green grass texture.
      (1,2) right edge: grass on left half, dirt on right half, vertical boundary.
      (1,3) center: full grass coverage.
      (2,0) bottom-left corner: small grass patch in top-right quarter only, rest is dirt.
      (2,1) bottom edge: grass on top half, dirt on bottom half.
      (2,2) bottom-right corner: small grass patch in top-left quarter only, rest is dirt.
      (2,3) bottom edge: grass on top half, dirt on bottom half.
      (3,0) left edge: grass on right half, dirt on left half.
      (3,1) center: full grass coverage.
      (3,2) right edge: grass on left half, dirt on right half.
      (3,3) center: full grass coverage.
      All boundaries are hard pixel edges. Grass: 5-color ramp dark cool-green to warm
      yellow-green with fine texture strokes. Dirt: brown earth 5-color ramp.
      Left-top lighting. Solid background.

  # ═══════════════════════════════════════════
  # 沙地组 (Sand Group Sheet)
  # ═══════════════════════════════════════════
  - id: "sand-sheet"
    name: "沙地地形组大图"
    target_size: [192, 192]
    desc: >
      16-bit pixel art, top-down RPG seamless desert sand terrain tileset sheet, 192x192
      pixels, 4x4 grid of 48x48 tiles. NO anti-aliasing, NO blur, NO borders between tiles.
      Seamless tileable sand pattern, edge-to-edge continuity. Center 2x2: golden sand
      with dune ripple texture. Edge tiles: sand-to-grey-stone transition with hard pixel
      edge. Corner tiles: rounded sand-to-stone curves. All transitions seamless across
      tile boundaries. Left-top lighting, 5-color ramp from dark brown to warm gold.
      NO outline around tiles. Solid background.

  # ═══════════════════════════════════════════
  # 水域+海岸线组 (Water+Shoreline Group Sheet)
  # ═══════════════════════════════════════════
  - id: "water-sheet"
    name: "水域海岸线地形组大图"
    target_size: [192, 192]
    desc: >
      16-bit pixel art, top-down RPG seamless water and shoreline terrain tileset sheet,
      192x192 pixels, 4x4 grid of 48x48 tiles. NO anti-aliasing, NO blur, NO borders.
      Center 2x2: pure teal-blue water with ripple lines and reflection specks.
      Edge tiles: water-to-sandy-beach transition with wave foam line at boundary,
      hard pixel edge. Corner tiles: rounded water-to-beach curves with foam.
      Water color and ripple density must be IDENTICAL across all tiles for seamless
      tiling. Left-top lighting, 5-color ramp from dark navy to bright cyan with white
      foam highlights. NO outline around tiles. Solid background.

  # ═══════════════════════════════════════════
  # 岩壁+悬崖组 (Rock+Cliff Group Sheet)
  # ═══════════════════════════════════════════
  - id: "rock-sheet"
    name: "岩壁悬崖地形组大图"
    target_size: [192, 192]
    desc: >
      16-bit pixel art, top-down RPG seamless rocky mountain and cliff terrain tileset
      sheet, 192x192 pixels, 4x4 grid of 48x48 tiles. NO anti-aliasing, NO blur, NO borders.
      Center 2x2: flat rocky ground with sparse grass tufts (cliff top, walkable).
      Edge tiles: rocky ground to sheer vertical cliff face transition, cliff has
      horizontal strata lines and cracks, darker shadow at base. Corner tiles: rounded
      cliff edge curves. All rock texture seamless across boundaries. Left-top lighting,
      5-color ramp from near-black to medium grey-brown. NO outline around tiles. Solid bg.

  # ═══════════════════════════════════════════
  # 密林组 (Jungle Group Sheet)
  # ═══════════════════════════════════════════
  - id: "jungle-sheet"
    name: "密林地形组大图"
    target_size: [192, 192]
    desc: >
      16-bit pixel art, top-down RPG seamless dense jungle terrain tileset sheet, 192x192
      pixels, 4x4 grid of 48x48 tiles. NO anti-aliasing, NO blur, NO borders.
      Center 2x2: dark green jungle floor with dappled light spots and fallen leaves.
      Edge tiles: jungle-to-clearing transition with hard pixel edge. Corner tiles:
      rounded jungle-to-clearing curves. All leaf and shadow patterns seamless across
      boundaries. Left-top lighting, 5-color ramp from near-black green to bright leaf
      green. NO outline around tiles. Solid background.

  # ═══════════════════════════════════════════
  # 水泽组 (Marsh Group Sheet)
  # ═══════════════════════════════════════════
  - id: "marsh-sheet"
    name: "水泽地形组大图"
    target_size: [192, 192]
    desc: >
      16-bit pixel art, top-down RPG seamless shallow marsh terrain tileset sheet, 192x192
      pixels, 4x4 grid of 48x48 tiles. NO anti-aliasing, NO blur, NO borders.
      Center 2x2: teal-green shallow water with duckweed and visible pebbles.
      Edge tiles: marsh-to-grass transition with hard pixel edge. Corner tiles: rounded
      marsh-to-grass curves. Water reflection seamless across boundaries. Left-top lighting,
      5-color ramp from dark teal to bright aqua. NO outline around tiles. Solid background.
