# 九野 · 21路修炼图标 AI Prompt 目录
# 风格宪法 (继承 path_icons.png 程序化版的视觉参数):
#   - 48×48 native → 192×192 导出 (4x NEAREST)
#   - 斜角卡框 bevel + 品阶宝石 (tier 1-5)
#   - 5-tone ramp 色阶: 暗部冷调→亮部暖调, hue-shift
#   - 左上定向光源 (light from top-left, shadow bottom-right)
#   - Selout 选择性轮廓: 实心像素边缘→该处最暗色描边
#   - 母题精修: 多件带光影, 形由 archetype, 色由 ramp
#   - 禁止: 抗锯齿/模糊/半透明/渐变/非像素颗粒

