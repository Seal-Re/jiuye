// ==================== INIT ====================
const chartDom = document.getElementById('chart');
const myChart = echarts.init(chartDom, 'dark');

// Recursively set collapsed defaults
function setDefaultCollapse(node, depth) {
  if (!node.children) return;
  if (depth >= 3) node.collapsed = true;
  node.children.forEach(c => setDefaultCollapse(c, depth + 1));
}
treeData.children.forEach(c => setDefaultCollapse(c, 1));

myChart.setOption({
  tooltip: {
    trigger: 'item', triggerOn: 'mousemove', enterable: true, confine: true,
    backgroundColor: 'rgba(22,33,62,0.97)', borderColor: '#0f3460', borderWidth: 2,
    padding: [12,16], textStyle: { color:'#e0e0e0', fontSize:12 },
    extraCssText: 'max-width:460px;white-space:pre-wrap;word-break:break-all;',
    formatter: function(p) {
      if (!p.data) return p.name;
      var d = p.data;
      var h = '<div style="font-size:14px;font-weight:bold;margin-bottom:8px;color:#e94560">'+p.name.replace(/\n/g,'<br>')+'</div>';
      if(d._files) h+='<div style="margin-bottom:4px"><span style="color:#888">📁 代码: </span><span style="color:#4ecca3;font-family:Consolas;font-size:11px">'+d._files+'</span></div>';
      if(d._docs) h+='<div style="margin-bottom:4px"><span style="color:#888">📄 文档: </span><span style="color:#f0a500;font-size:11px">'+d._docs+'</span></div>';
      if(d._conflict) h+='<div style="margin-top:8px;padding:8px;background:#2a1a1a;border-left:3px solid #e94560;border-radius:4px"><span style="color:#ff6b6b;font-weight:bold">⚠️ 差异:</span><br><span style="color:#ff8888;font-size:11px">'+d._conflict+'</span></div>';
      return h;
    }
  },
  series: [{
    type: 'tree', data: [treeData],
    top: '2%', left: '2%', bottom: '2%', right: '2%',
    symbol: 'circle', symbolSize: 10, orient: 'LR',
    roam: true,  // <== DRAG + ZOOM
    scaleLimit: { min: 0.15, max: 5 },
    expandAndCollapse: true,
    animationDuration: 400, animationDurationUpdate: 300,
    label: {
      position: 'left', verticalAlign: 'middle', align: 'right',
      fontSize: 11, color: '#e0e0e0',
      formatter: function(p) { return p.name.replace(/\n/g,' '); }
    },
    leaves: { label: { position:'right', verticalAlign:'middle', align:'left' } },

// ==================== SELECTED NODE STATE ====================
var selectedNode = null;
var selectedNodeName = '';
var currentRating = 0;

// ==================== EVALUATION STORAGE ====================
function evalKey(nodeName) { return 'jiuye_eval_'+btoa(unescape(encodeURIComponent(nodeName))); }
function loadEvals(nodeName) {
  try { return JSON.parse(localStorage.getItem(evalKey(nodeName))||'[]'); }
  catch(e) { return []; }
}
function saveEvals(nodeName, evals) {
  localStorage.setItem(evalKey(nodeName), JSON.stringify(evals));
}

// ==================== RENDER EVALUATIONS ====================
function renderEvals(nodeName) {
  var list = document.getElementById('eval-list');
  var evals = loadEvals(nodeName);
  if (evals.length === 0) {
    list.innerHTML = '<div class="eval-empty">暂无评价 — 在下方输入第一条评价或提问</div>';
  } else {
    var h = '';
    evals.slice().reverse().forEach(function(e) {
      var ratingLabels = ['','🔴 严重问题','🟡 需关注','⚪ 一般','🟢 良好','⭐ 优秀'];
      var rl = e.rating ? ratingLabels[e.rating]||'' : '';
      h += '<div class="eval-item">'+
        '<div class="eval-meta"><span>'+e.time+'</span><span class="eval-rating">'+rl+'</span></div>'+
        '<div class="eval-body">'+escapeHtml(e.text)+'</div>'+
        '</div>';
    });
    list.innerHTML = h;
  }
  document.getElementById('eval-count').textContent = evals.length+' 条评价';
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ==================== SHOW TOAST ====================
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(function(){ t.style.opacity = '0'; }, 2000);
}

// ==================== NODE CLICK HANDLER ====================
myChart.on('click', function(params) {
  if (!params.data || !params.name) return;
  var d = params.data;
  var name = params.name.replace(/\n/g, ' · ');
  selectedNode = d;
  selectedNodeName = name;

  // Determine status
  var emoji = name.substring(0, 2);
  var statusText = '';
  if (emoji.includes('✅')) statusText = '<span style="color:#4ecca3">✅ 已完成 (代码闭环 + 文档一致)</span>';
  else if (emoji.includes('🔄')) statusText = '<span style="color:#f0a500">🔄 开发中 (部分实现)</span>';
  else if (emoji.includes('❌')) statusText = '<span style="color:#e94560">❌ 未开始 (仅设计文档)</span>';
  else if (emoji.includes('⚠️')) statusText = '<span style="color:#ff6b6b">⚠️ 文档冲突/偏差</span>';

  // Build info panel
  var h = '<h3>📋 '+name+'</h3>';
  h += '<div class="section"><div class="label">状态</div><div class="value">'+statusText+'</div></div>';
  if (d._files) {
    h += '<div class="section"><div class="label">📁 底层代码文件/类名</div><div class="value" style="font-family:Consolas,monospace;font-size:11px;color:#4ecca3">'+d._files+'</div></div>';
  }
  if (d._docs) {
    h += '<div class="section"><div class="label">📄 对应文档章节/编号</div><div class="value" style="color:#f0a500">'+d._docs+'</div></div>';
  }
  if (d._conflict) {
    h += '<div class="section conflict"><div class="label" style="color:#e94560">⚠️ 对账差异描述</div><div class="conflict-text">'+d._conflict+'</div></div>';
  }
  if (!d._files && !d._docs && !d._conflict && d.children && d.children.length > 0) {
    h += '<div class="section"><div style="color:#666;font-size:11px">📎 聚合节点 — '+d.children.length+' 个子节点</div></div>';
  }
  document.getElementById('node-info').innerHTML = h;

  // Show eval input
  document.getElementById('eval-input-area').style.display = 'block';
  document.getElementById('eval-text').value = '';
  currentRating = 0;
  updateStarButtons();
  document.getElementById('eval-submit').disabled = true;
  renderEvals(name);
});

// ==================== RATING STARS ====================
var starButtons = document.querySelectorAll('#rating-stars button');
starButtons.forEach(function(btn) {
  btn.addEventListener('click', function() {
    currentRating = parseInt(this.dataset.r);
    updateStarButtons();
    checkEvalReady();
  });
});
function updateStarButtons() {
  starButtons.forEach(function(b) {
    if (parseInt(b.dataset.r) <= currentRating) b.classList.add('active');
    else b.classList.remove('active');
  });
}

// ==================== EVAL TEXT INPUT ====================
var evalText = document.getElementById('eval-text');
evalText.addEventListener('input', checkEvalReady);
function checkEvalReady() {
  document.getElementById('eval-submit').disabled = (evalText.value.trim().length === 0);
}

// Enter to submit
evalText.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitEval();
  }
});

// ==================== SUBMIT EVALUATION ====================
function submitEval() {
  var text = evalText.value.trim();
  if (!text || !selectedNodeName) return;
  var evals = loadEvals(selectedNodeName);
  var now = new Date();
  var ts = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+
           pad(now.getHours())+':'+pad(now.getMinutes());
  evals.push({ text:text, rating:currentRating, time:ts, node:selectedNodeName });
  saveEvals(selectedNodeName, evals);
  evalText.value = '';
  currentRating = 0;
  updateStarButtons();
  document.getElementById('eval-submit').disabled = true;
  renderEvals(selectedNodeName);
  toast('✅ 评价已保存');
}
function pad(n) { return n<10?'0'+n:''+n; }
document.getElementById('eval-submit').addEventListener('click', submitEval);

// ==================== SEARCH ====================
window.searchNode = function(query) {
  var resetBtn = document.getElementById('search-reset');
  if (!query) { resetSearch(); return; }
  resetBtn.style.display = 'inline-block';
  var q = query.toLowerCase();
  function filterTree(node) {
    if (!node) return null;
    var nm = node.name.toLowerCase().includes(q);
    var fm = node._files && node._files.toLowerCase().includes(q);
    var dm = node._docs && node._docs.toLowerCase().includes(q);
    var self = nm||fm||dm;
    var fc = [];
    if (node.children) {
      for (var i=0;i<node.children.length;i++) { var r=filterTree(node.children[i]); if(r) fc.push(r); }
    }
    if (self || fc.length>0) {
      var c = JSON.parse(JSON.stringify(node));
      c.children = fc.length>0 ? fc : (node.children||[]);
      c.collapsed = false;
      return c;
    }
    return null;
  }
  var filtered = { name:'🔍 搜索: '+query, children:[] };
  if (treeData.children) {
    treeData.children.forEach(function(c){ var r=filterTree(c); if(r) filtered.children.push(r); });
  }
  myChart.setOption({ series:[{ data:[filtered], roam:true, scaleLimit:{min:0.15,max:5} }] });
  if (filtered.children.length===0) {
    document.getElementById('node-info').innerHTML = '<h3>🔍 搜索: '+query+'</h3><div class="section"><div style="color:#888">未找到匹配节点</div></div>';
  }
};
window.resetSearch = function() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-reset').style.display = 'none';
  myChart.setOption({ series:[{ data:[treeData], roam:true, scaleLimit:{min:0.15,max:5} }] });
};

window.addEventListener('resize', function(){ myChart.resize(); });

// ==================== INITIAL EMPTY STATE ====================
renderEvals('');
