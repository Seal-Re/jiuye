    requirement: >
      恩怨/复仇弧/跨代继承走独立 Drama PRNG 流（Split(6)）；off（dramaOn=false）
      不激活、不消费 Split(6)，保 off 逐字节。
    source_gdd: design/gdd/drama-system.md
    governing_adr: null
    status: implemented
    verified_by:
      - drama 恩怨链测试（drama-001~013 套件）
      - off 逐字节测试（drama 轨）
    redline: null
    notes: >
      drama-engine epic 已收官（drama-013 端到端验收）。无独立 ADR
      （遵守 ADR-0003 的独立流 + off 不激活模式，未单独立 ADR）。
      RngStreamIds.Drama = 6。

  - id: TR-MAP-001
    requirement: >
      世界地图走独立 Map PRNG 流（Split(7)）；Kruskal MST 拓扑生成；
      off（mapOn=false）不激活、不消费 Split(7)。
    source_gdd: null
    governing_adr: null
    status: implemented
    verified_by:
      - 地图生成/geo 查询测试
      - off 逐字节测试（map 轨）
    redline: null
    notes: >
      GDD 待补（采用迁移计划 Step 4 DEFER：map-system GDD 待 epic 转 doing）。
      RngStreamIds.Map = 7。KruskalMstGenerator / IGeoQuery。

  - id: TR-FACTION-001
    requirement: >
      门派派系走独立 Faction PRNG 流（Split(8)）；晋升+夺地机制；
      off（factionOn=false）不激活、不消费 Split(8)。
    source_gdd: null
    governing_adr: null
    status: implemented
    verified_by:
      - 门派录/派系查询测试
      - off 逐字节测试（faction 轨）
    redline: null
