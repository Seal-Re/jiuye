  - id: TR-FACTION-001
    requirement: >
      门派派系走独立 Faction PRNG 流（Split(8)）；晋升+夺地机制；
      off（factionOn=false）不激活、不消费 Split(8)。
    source_gdd: null
    governing_adr: null
    status: implemented
    verified_by:
      - 门派录/派系查询测试
      - off 逐字节测试（faction 轨）
    redline: null
    notes: >
      GDD 待补（采用迁移计划 Step 4 DEFER：faction GDD 待 epic 转 doing）。
      RngStreamIds.Faction = 8。SectLedger / IFactionQuery。

  # ---- 表现层 / Godot View (VIEW) ----
  # 源真相 = docs/architecture/godot-architecture-manifest.md（前瞻规范，Alpha 入口基线）。
  # 以下条目为 manifest 关键约束的溯源锚——多为 proposed/designed（View 层未落地）。
  # 不新造机制；实现前须先出 GDD/ADR 定护栏（红线 A.10 内核前置）。
  - id: TR-VIEW-001
    requirement: >
      逻辑与表现绝对隔离：Model(C# 内核) 持世界状态/战力/剧情/网格，严禁引入 Godot 库
      （Godot.Mathf/RandomNumberGenerator 等）；View(Godot) 仅渲染 + 输入捕获，经 Signal/Event
      观察内核；Controller(_Process) 仅转发，Tick() 由玩家输入驱动。
    source_gdd: docs/architecture/godot-architecture-manifest.md
    governing_adr: adr-0004-godot-view-host-boundary
    status: designed  # 边界纪律已立（adr-0004）；Godot 宿主代码未生成
    verified_by:
      - BannedApiAnalyzers（Godot.* 禁入 Core，P-FORBIDDEN-1；当前 src 零命中）
      - code review（P-REQUIRED-1..4 / P-FORBIDDEN-1..4，表现层边界）
    redline: A.10
    notes: manifest §1.1；完全对齐 adr-0004 §① + architecture §9.1 + control-manifest P 层。

  - id: TR-VIEW-002
    requirement: >
      确定性回放安全：核心 100% 纯整数；录像/回放仅记 [初始 Seed] + [每回合离散指令序列]；
      导致浮点漂移的即时物理碰撞结算严禁进 C# 内核。
    source_gdd: docs/architecture/godot-architecture-manifest.md
    governing_adr:
      - adr-0001-integer-determinism
      - adr-0003-cultivation-off-byte-identical
    status: implemented  # 内核整数确定性 + 命令端口整数意图已达成（Core 侧）；录像系统本身未建
    verified_by:
      - ILFloatScanner（Jianghu.Cultivation 零浮点）
      - OffByteIdenticalTests（off 逐字节 SHA256）
    redline: B.2
    notes: manifest §1.2 = 复述 TR-DET-001/002；"离散指令序列" = adr-0004 §① 整数意图命令端口。

  - id: TR-VIEW-003
    requirement: >
      反应式回合战斗：玩家选技能 → View 触发 QTE → 结果映射为离散乘子（0.5x/1.0x/1.2x）
      回传内核结算；内核闪避/命中 → View 反应窗口帧宽容度；弹反(Parry)成功抵消内核原定伤害；
      同类强控连发时弹反窗口阶梯放大（抗性递减 = balance-007）。
    source_gdd: docs/architecture/godot-architecture-manifest.md
    governing_adr: adr-0002-module-factory-effect-system
    status: designed  # combat-system.md 已定"双档保真度"(Core 整数 q_core / View 浮点窗口 q)；View 未建
    verified_by:
      - code review（离散乘子回传 = 浮点不进 Core，P-FORBIDDEN-2）
      - balance-007 story（Review Approved；DR=duration-based/duel-local）
    redline: B.2
    notes: >
      manifest §3。QTE 浮点手感只在 View；回传内核的是离散整数乘子 → 守 B.2。
      弹反窗口阶梯 = balance-007 CC 抗性递减（story-007-control-cooldown-dr.md）。

  - id: TR-VIEW-004
    requirement: >
      韧性/硬直系统（Poise/Stagger）：体质/防御属性 → 战斗场景韧性条；强控标签攻击产生高削韧；
      韧性清零前受击霸体（不断动作），击破后触发真实硬直 + 控制状态。
    source_gdd: docs/architecture/godot-architecture-manifest.md
    governing_adr: adr-0002-module-factory-effect-system
    status: proposed  # 新战斗维度，未设计；纯整数可表达（韧性条/削韧=int），与 B.2 无冲突
    verified_by: []  # 待 GDD + 实现
    redline: null
    notes: manifest 补§3.2。落地时须接 combat-system.md 结算层 + Modules 工厂（B.9）。

  - id: TR-VIEW-005
    requirement: >
      PCG 动态生成：数据驱动（宗门/势力/剧情模板经 JSON/YAML 外置，杜绝硬编码）；
