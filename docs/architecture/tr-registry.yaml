    source_gdd: docs/architecture/godot-architecture-manifest.md
    governing_adr: adr-0004-godot-view-host-boundary
    status: proposed  # 未设计；等距 TileMap = adr-0004 §③ iso 预留（0 代码）
    verified_by: []  # 待 GDD + ADR
    redline: A.10
    notes: >
      manifest §4。数据驱动一致（配置外置）；等距投影浮点/像素只属 View（§9.3）。
      **开放调和项 R2**：柏林噪声浮点若入 Core 撞 B.2 → 候选 adr-0006（architecture §10.2）。

  - id: TR-VIEW-006
    requirement: >
      动态叙事/LLM 集成：前端江湖记事本历史图谱 UI；系统为外部文本生成（本地 LLM/RAG）留接口，
      每次输入 Seed 时自动书写背景故事/宗门史/功法视觉描述；功法数值变异限于 PE 平价公式阈值内。
    source_gdd: docs/architecture/godot-architecture-manifest.md
    governing_adr: null
    status: proposed  # IBrain 端口在（Decide 层）；llm-brain epic 未设计（原始核心愿景）
    verified_by:
      - InvCrossDuelTests（数值变异限 PE 阈 = INV-CROSS C1，见 TR-BAL-001）
    redline: null
    notes: >
      manifest 补§4.3。数值变异"限 PE 平价阈"= TR-BAL-001（C1 [40,60]%）。
      llm-brain 实现前须先出 GDD 定护栏（epics index #10 Not designed）。

